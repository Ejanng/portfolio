<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #0f172a;
            --secondary: #1e293b;
            --accent: #38bdf8;
            --accent-hover: #0ea5e9;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --card-bg: #1e293b;
            --gradient-start: #0f172a;
            --gradient-end: #1e1b4b;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, var(--gradient-start) 0%, var(--gradient-end) 100%);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.6;
        }

        #root {
            min-height: 100vh;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            z-index: 1000;
            padding: 1rem 2rem;
        }

        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent) 0%, #818cf8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.3s;
            position: relative;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--accent);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s;
        }

        .nav-links a:hover::after, .nav-links a.active::after {
            width: 100%;
        }

        /* Main Content */
        main {
            padding-top: 80px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Hero Section */
        .hero {
            min-height: calc(100vh - 80px);
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }

        .hero-content h1 {
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: fadeInUp 0.8s ease-out;
        }

        .hero-content p {
            font-size: 1.25rem;
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 2rem;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        .cta-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .btn {
            padding: 0.875rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            border: none;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--primary);
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text);
            border: 2px solid var(--border);
        }

        .btn-secondary:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Projects Grid */
        .section-title {
            font-size: 2.5rem;
            margin-bottom: 3rem;
            text-align: center;
            position: relative;
            display: inline-block;
            width: 100%;
        }

        .section-title::after {
            content: '';
            display: block;
            width: 60px;
            height: 4px;
            background: var(--accent);
            margin: 1rem auto 0;
            border-radius: 2px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 2rem;
        }

        .project-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: all 0.3s;
            cursor: pointer;
        }

        .project-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .project-preview {
            position: relative;
            height: 200px;
            background: var(--secondary);
            overflow: hidden;
        }

        .project-preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }

        .project-card:hover .project-preview img {
            transform: scale(1.05);
        }

        .project-tech-stack {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 1rem;
            background: linear-gradient(to top, rgba(15, 23, 42, 0.9), transparent);
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .tech-tag {
            background: rgba(56, 189, 248, 0.2);
            color: var(--accent);
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid rgba(56, 189, 248, 0.3);
        }

        .project-info {
            padding: 1.5rem;
        }

        .project-info h3 {
            font-size: 1.25rem;
            margin-bottom: 0.5rem;
            color: var(--text);
        }

        .project-info p {
            color: var(--text-muted);
            font-size: 0.95rem;
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Project Detail Modal/Page */
        .project-detail {
            animation: fadeIn 0.3s ease-out;
        }

        .project-header {
            margin-bottom: 3rem;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-muted);
            text-decoration: none;
            margin-bottom: 2rem;
            transition: color 0.3s;
        }

        .back-btn:hover {
            color: var(--accent);
        }

        .project-title {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #fff 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .project-meta {
            display: flex;
            gap: 2rem;
            flex-wrap: wrap;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .project-meta span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Slideshow */
        .slideshow-container {
            position: relative;
            background: var(--secondary);
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 3rem;
            border: 1px solid var(--border);
        }

        .slideshow-main {
            position: relative;
            height: 500px;
            background: #000;
        }

        .slide {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .slide-content {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem;
            background: linear-gradient(to top, rgba(15, 23, 42, 0.95), transparent);
        }

        .slide-content h3 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }

        .slide-content p {
            color: var(--text-muted);
        }

        .slideshow-controls {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 1rem;
            pointer-events: none;
        }

        .slideshow-btn {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border);
            color: var(--text);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            pointer-events: all;
            backdrop-filter: blur(4px);
        }

        .slideshow-btn:hover {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
        }

        .slideshow-thumbnails {
            display: flex;
            gap: 0.5rem;
            padding: 1rem;
            overflow-x: auto;
            background: var(--primary);
        }

        .thumbnail {
            min-width: 100px;
            height: 70px;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.3s;
            opacity: 0.6;
        }

        .thumbnail:hover, .thumbnail.active {
            opacity: 1;
            border-color: var(--accent);
        }

        .thumbnail img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Project Content Sections */
        .project-sections {
            display: grid;
            gap: 3rem;
        }

        .content-section {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 2rem;
            border: 1px solid var(--border);
        }

        .content-section h2 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            color: var(--accent);
        }

        .content-section h2 svg {
            width: 24px;
            height: 24px;
        }

        .features-list {
            list-style: none;
            display: grid;
            gap: 1rem;
        }

        .features-list li {
            display: flex;
            align-items: flex-start;
            gap: 0.75rem;
            padding: 1rem;
            background: rgba(56, 189, 248, 0.05);
            border-radius: 8px;
            border-left: 3px solid var(--accent);
        }

        .features-list li svg {
            color: var(--accent);
            flex-shrink: 0;
            margin-top: 0.25rem;
        }

        .docs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
        }

        .doc-card {
            background: var(--primary);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .doc-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
            background: rgba(56, 189, 248, 0.05);
        }

        .doc-icon {
            width: 48px;
            height: 48px;
            background: rgba(56, 189, 248, 0.1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
        }

        .doc-info h4 {
            margin-bottom: 0.25rem;
        }

        .doc-info span {
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .github-link {
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            background: var(--primary);
            color: var(--text);
            padding: 1rem 2rem;
            border-radius: 12px;
            text-decoration: none;
            border: 1px solid var(--border);
            transition: all 0.3s;
            font-weight: 600;
        }

        .github-link:hover {
            background: var(--accent);
            color: var(--primary);
            border-color: var(--accent);
        }

        /* Loading States */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            
            .projects-grid {
                grid-template-columns: 1fr;
            }
            
            .slideshow-main {
                height: 300px;
            }
            
            .project-title {
                font-size: 2rem;
            }
        }
    </style>
</head>

                Clock: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>,
                Layers: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>,
                Book: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>,
                Code: <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            };
            return icons[name] || null;
        };

        // Navigation Component
        const Navigation = () => {
            const location = useLocation();
            
            return (
                <nav>
                    <div className="nav-container">
                        <Link to="/" className="logo">Portfolio</Link>
                        <ul className="nav-links">
                            <li>
                                <Link to="/" className={location.pathname === '/' ? 'active' : ''}>
                                    Home
                                </Link>
                            </li>
                            <li>
                                <Link to="/projects" className={location.pathname.startsWith('/projects') ? 'active' : ''}>
                                    Projects
                                </Link>
                            </li>
                        </ul>
                    </div>
                </nav>
            );
        };

        // Hero Section
        const Hero = () => {
            return (
                <div className="hero">
                    <div className="hero-content">
                        <h1>Full Stack Developer</h1>
                        <p>Building robust systems with modern technologies. Specialized in cybersecurity, AI integration, and scalable web applications.</p>
                        <div className="cta-buttons">
                            <Link to="/projects" className="btn btn-primary">
                                View Projects <Icon name="ExternalLink" size={18} />
                            </Link>
                            <a href="https://github.com/yourusername" target="_blank" rel="noopener noreferrer" className="btn btn-secondary">
                                <Icon name="Github" size={18} /> GitHub
                            </a>
                        </div>
                    </div>
                </div>
            );
        };

        // Project Card Component
        const ProjectCard = ({ project }) => {
            return (
                <Link to={`/projects/${project.id}`} className="project-card">
                    <div className="project-preview">
                        <img src={project.thumbnail} alt={project.title} loading="lazy" />
                        <div className="project-tech-stack">
                            {project.techStack.slice(0, 3).map((tech, idx) => (
                                <span key={idx} className="tech-tag">{tech}</span>
                            ))}
                            {project.techStack.length > 3 && (
                                <span className="tech-tag">+{project.techStack.length - 3}</span>
                            )}
                        </div>
                    </div>
                    <div className="project-info">
                        <h3>{project.title}</h3>
                        <p>{project.description}</p>
                    </div>
                </Link>
            );
        };

        // Projects List Page
        const ProjectsPage = () => {
            const { data: projects, isLoading } = useQuery({
                queryKey: ['projects'],
                queryFn: () => Promise.resolve(projectsData),
            });

            if (isLoading) return <div className="loading"><div className="spinner"></div></div>;

            return (
                <div className="container">
                    <h1 className="section-title">Featured Projects</h1>
                    <div className="projects-grid">
                        {projects?.map(project => (
                            <ProjectCard key={project.id} project={project} />
                        ))}
                    </div>
                </div>
            );
        };

        // Slideshow Component
        const Slideshow = ({ slides }) => {
            const [current, setCurrent] = useState(0);

            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrent(prev => (prev + 1) % slides.length);
                }, 5000);
                return () => clearInterval(timer);
            }, [slides.length]);

            const goTo = (index) => setCurrent(index);
            const prev = () => setCurrent(current === 0 ? slides.length - 1 : current - 1);
            const next = () => setCurrent((current + 1) % slides.length);

            return (
                <div className="slideshow-container">
                    <div className="slideshow-main">
                        {slides.map((slide, idx) => (
                            <div key={idx} className={`slide ${idx === current ? 'active' : ''}`}>
                                <img src={slide.image} alt={slide.title} />
                                <div className="slide-content">
                                    <h3>{slide.title}</h3>
                                    <p>{slide.description}</p>
                                </div>
                            </div>
                        ))}
                        <div className="slideshow-controls">
                            <button className="slideshow-btn" onClick={prev}>
                                <Icon name="ChevronLeft" size={24} />
                            </button>
                            <button className="slideshow-btn" onClick={next}>
                                <Icon name="ChevronRight" size={24} />
                            </button>
                        </div>
                    </div>
                    <div className="slideshow-thumbnails">
                        {slides.map((slide, idx) => (
                            <div 
                                key={idx} 
                                className={`thumbnail ${idx === current ? 'active' : ''}`}
                                onClick={() => goTo(idx)}
                            >
                                <img src={slide.image} alt={slide.title} />
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        // Project Detail Page
        const ProjectDetail = () => {
            const { projectId } = useParams();
            const navigate = useNavigate();
            
            const { data: project, isLoading } = useQuery({
                queryKey: ['project', projectId],
                queryFn: () => Promise.resolve(projectsData.find(p => p.id === projectId)),
            });

            if (isLoading) return <div className="loading"><div className="spinner"></div></div>;
            if (!project) return <div className="container">Project not found</div>;

            return (
                <div className="container project-detail">
                    <div className="project-header">
                        <a href="#" onClick={(e) => { e.preventDefault(); navigate(-1); }} className="back-btn">
                            <Icon name="ArrowLeft" size={20} /> Back to Projects
                        </a>
                        
                        <h1 className="project-title">{project.title}</h1>
                        
                        <div className="project-meta">
                            <span><Icon name="Calendar" size={18} /> {project.date}</span>
                            <span><Icon name="Clock" size={18} /> {project.duration}</span>
                            <span><Icon name="Layers" size={18} /> {project.techStack.join(', ')}</span>
                        </div>

                        <a href={project.githubUrl} target="_blank" rel="noopener noreferrer" className="github-link">
                            <Icon name="Github" size={20} /> View on GitHub <Icon name="ExternalLink" size={16} />
                        </a>
                    </div>

                    <Slideshow slides={project.slides} />

                    <div className="project-sections">
                        <div className="content-section">
                            <h2><Icon name="Code" /> Key Features</h2>
                            <ul className="features-list">
                                {project.features.map((feature, idx) => (
                                    <li key={idx}>
                                        <Icon name="Check" size={18} />
                                        <span>{feature}</span>
                                    </li>
                                ))}
                            </ul>
                        </div>

                        <div className="content-section">
                            <h2><Icon name="Book" /> Documentation</h2>
                            <div className="docs-grid">
                                {project.documentation.map((doc, idx) => (
                                    <a key={idx} href={doc.url} className="doc-card">
                                        <div className="doc-icon">
                                            <Icon name="FileText" size={24} />
                                        </div>
                                        <div className="doc-info">
                                            <h4>{doc.title}</h4>
                                            <span>{doc.type}</span>
                                        </div>
                                    </a>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // Router Setup
        const rootRoute = {
            path: '/',
            component: () => (
                <>
                    <Navigation />
                    <main>
                        <Outlet />
                    </main>
                </>
            ),
            children: [
                {
                    path: '/',
                    component: Hero,
                },
                {
                    path: 'projects',
                    component: ProjectsPage,
                },
                {
                    path: 'projects/$projectId',
                    component: ProjectDetail,
                },
            ],
        };

        const router = createRouter({
            routeTree: rootRoute,
            defaultPreload: 'intent',
        });

        // App Component
        const App = () => {
            return (
                <QueryClientProvider client={queryClient}>
                    <RouterProvider router={router} />
                </QueryClientProvider>
            );
        };

        // Render
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
